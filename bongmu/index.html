  var bounds = new naver.maps.LatLngBounds();

    if (depth === 0) {
      bounds.extend(new naver.maps.LatLng(coords[1], coords[0]));

      for (var i = 0; i < coords.length; i++) walk(coords[i], depth - 1);

  });
  return bounds;
}
